<svg width="680" height="280" viewBox="0 0 680 280" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="ps_s"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0B1929" flood-opacity="0.06"/></filter>
    <marker id="ps_a" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#94A3B8"/>
    </marker>
  </defs>

  <rect width="680" height="280" rx="12" fill="#FAFBFC" stroke="#E2E8F0" stroke-width="1"/>
  <text x="340" y="28" font-family="'Inter',system-ui,sans-serif" font-size="14" font-weight="700" fill="#0F172A" text-anchor="middle">Plugin System Architecture</text>

  <!-- Core (center) -->
  <rect x="255" y="100" width="170" height="70" rx="10" fill="#0B1929" filter="url(#ps_s)"/>
  <text x="340" y="130" font-family="'SF Mono',monospace" font-size="13" font-weight="700" fill="#40C4FF" text-anchor="middle">fx_core</text>
  <text x="340" y="150" font-family="'Inter',system-ui,sans-serif" font-size="11" fill="#94A3B8" text-anchor="middle">PluginHook interface</text>
  <text x="340" y="163" font-family="'Inter',system-ui,sans-serif" font-size="11" fill="#94A3B8" text-anchor="middle">PluginLoader</text>

  <!-- Inference Hooks (top left) -->
  <rect x="30" y="50" width="160" height="55" rx="8" fill="white" stroke="#8B5CF6" stroke-width="1.5" filter="url(#ps_s)"/>
  <text x="110" y="72" font-family="'Inter',system-ui,sans-serif" font-size="11" font-weight="600" fill="#8B5CF6" text-anchor="middle">Inference Hooks</text>
  <text x="110" y="90" font-family="'SF Mono',monospace" font-size="10" fill="#64748B" text-anchor="middle">inferProjects()</text>
  <text x="110" y="100" font-family="'SF Mono',monospace" font-size="10" fill="#64748B" text-anchor="middle">inferDependencies()</text>

  <!-- Executor Plugins (top right) -->
  <rect x="490" y="50" width="160" height="55" rx="8" fill="white" stroke="#EC4899" stroke-width="1.5" filter="url(#ps_s)"/>
  <text x="570" y="72" font-family="'Inter',system-ui,sans-serif" font-size="11" font-weight="600" fill="#EC4899" text-anchor="middle">Executor Plugins</text>
  <text x="570" y="90" font-family="'SF Mono',monospace" font-size="10" fill="#64748B" text-anchor="middle">execute(project,</text>
  <text x="570" y="100" font-family="'SF Mono',monospace" font-size="10" fill="#64748B" text-anchor="middle">target, options)</text>

  <!-- Generator Plugins (bottom left) -->
  <rect x="30" y="175" width="160" height="55" rx="8" fill="white" stroke="#10B981" stroke-width="1.5" filter="url(#ps_s)"/>
  <text x="110" y="197" font-family="'Inter',system-ui,sans-serif" font-size="11" font-weight="600" fill="#10B981" text-anchor="middle">Generator Plugins</text>
  <text x="110" y="215" font-family="'SF Mono',monospace" font-size="10" fill="#64748B" text-anchor="middle">generate(name,</text>
  <text x="110" y="225" font-family="'SF Mono',monospace" font-size="10" fill="#64748B" text-anchor="middle">directory, options)</text>

  <!-- Conformance Plugins (bottom right) -->
  <rect x="490" y="175" width="160" height="55" rx="8" fill="white" stroke="#F59E0B" stroke-width="1.5" filter="url(#ps_s)"/>
  <text x="570" y="197" font-family="'Inter',system-ui,sans-serif" font-size="11" font-weight="600" fill="#F59E0B" text-anchor="middle">Conformance Rules</text>
  <text x="570" y="215" font-family="'SF Mono',monospace" font-size="10" fill="#64748B" text-anchor="middle">evaluate(projects,</text>
  <text x="570" y="225" font-family="'SF Mono',monospace" font-size="10" fill="#64748B" text-anchor="middle">rule, config)</text>

  <!-- Arrows from plugins to core -->
  <path d="M190 78 L255 115" stroke="#8B5CF6" stroke-width="1.5" stroke-dasharray="4 3"/>
  <path d="M490 78 L425 115" stroke="#EC4899" stroke-width="1.5" stroke-dasharray="4 3"/>
  <path d="M190 200 L255 155" stroke="#10B981" stroke-width="1.5" stroke-dasharray="4 3"/>
  <path d="M490 200 L425 155" stroke="#F59E0B" stroke-width="1.5" stroke-dasharray="4 3"/>

  <!-- Config box -->
  <rect x="240" y="210" width="200" height="55" rx="8" fill="#0D2137" filter="url(#ps_s)"/>
  <text x="340" y="232" font-family="'SF Mono',monospace" font-size="10" fill="#40C4FF" text-anchor="middle">pubspec.yaml fx: plugins:</text>
  <text x="340" y="248" font-family="'Inter',system-ui,sans-serif" font-size="10" fill="#94A3B8" text-anchor="middle">capabilities, priority, options</text>

  <path d="M340 170 L340 210" stroke="#40C4FF" stroke-width="1.5" marker-end="url(#ps_a)"/>
</svg>

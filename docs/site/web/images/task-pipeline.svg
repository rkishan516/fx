<svg width="700" height="260" viewBox="0 0 700 260" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="tp_s"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0B1929" flood-opacity="0.06"/></filter>
    <marker id="tp_a" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#40C4FF"/>
    </marker>
  </defs>

  <rect width="700" height="260" rx="12" fill="#FAFBFC" stroke="#E2E8F0" stroke-width="1"/>
  <text x="350" y="28" font-family="'Inter',system-ui,sans-serif" font-size="14" font-weight="700" fill="#0F172A" text-anchor="middle">Task Pipeline: fx run app test (with dependsOn: [^build, build])</text>

  <!-- shared:build -->
  <rect x="40" y="60" width="130" height="50" rx="8" fill="#0B1929" filter="url(#tp_s)"/>
  <text x="105" y="83" font-family="'SF Mono',monospace" font-size="11" font-weight="600" fill="#40C4FF" text-anchor="middle">shared:build</text>
  <text x="105" y="100" font-family="'Inter',system-ui,sans-serif" font-size="10" fill="#94A3B8" text-anchor="middle">^build (transitive)</text>

  <!-- models:build -->
  <rect x="220" y="60" width="130" height="50" rx="8" fill="#0B1929" filter="url(#tp_s)"/>
  <text x="285" y="83" font-family="'SF Mono',monospace" font-size="11" font-weight="600" fill="#40C4FF" text-anchor="middle">models:build</text>
  <text x="285" y="100" font-family="'Inter',system-ui,sans-serif" font-size="10" fill="#94A3B8" text-anchor="middle">^build (transitive)</text>

  <!-- app:build -->
  <rect x="400" y="60" width="130" height="50" rx="8" fill="#0B1929" filter="url(#tp_s)"/>
  <text x="465" y="83" font-family="'SF Mono',monospace" font-size="11" font-weight="600" fill="#40C4FF" text-anchor="middle">app:build</text>
  <text x="465" y="100" font-family="'Inter',system-ui,sans-serif" font-size="10" fill="#94A3B8" text-anchor="middle">build (local)</text>

  <!-- app:test -->
  <rect x="540" y="145" width="130" height="50" rx="8" fill="#0D2137" stroke="#40C4FF" stroke-width="2" filter="url(#tp_s)"/>
  <text x="605" y="168" font-family="'SF Mono',monospace" font-size="12" font-weight="700" fill="#40C4FF" text-anchor="middle">app:test</text>
  <text x="605" y="185" font-family="'Inter',system-ui,sans-serif" font-size="10" fill="#94A3B8" text-anchor="middle">requested target</text>

  <!-- Arrows -->
  <path d="M170 85 L220 85" stroke="#40C4FF" stroke-width="1.5" marker-end="url(#tp_a)"/>
  <path d="M350 85 L400 85" stroke="#40C4FF" stroke-width="1.5" marker-end="url(#tp_a)"/>
  <path d="M530 85 L605 85 L605 145" stroke="#40C4FF" stroke-width="1.5" marker-end="url(#tp_a)"/>

  <!-- Step numbers -->
  <circle cx="105" cy="130" r="12" fill="#40C4FF" opacity="0.15"/>
  <text x="105" y="134" font-family="'Inter',system-ui,sans-serif" font-size="11" font-weight="700" fill="#40C4FF" text-anchor="middle">1</text>
  <circle cx="285" cy="130" r="12" fill="#40C4FF" opacity="0.15"/>
  <text x="285" y="134" font-family="'Inter',system-ui,sans-serif" font-size="11" font-weight="700" fill="#40C4FF" text-anchor="middle">2</text>
  <circle cx="465" cy="130" r="12" fill="#40C4FF" opacity="0.15"/>
  <text x="465" y="134" font-family="'Inter',system-ui,sans-serif" font-size="11" font-weight="700" fill="#40C4FF" text-anchor="middle">3</text>
  <circle cx="605" cy="215" r="12" fill="#40C4FF" opacity="0.15"/>
  <text x="605" y="219" font-family="'Inter',system-ui,sans-serif" font-size="11" font-weight="700" fill="#40C4FF" text-anchor="middle">4</text>

  <!-- Legend -->
  <rect x="30" y="210" width="200" height="35" rx="6" fill="white" stroke="#E2E8F0"/>
  <text x="45" y="228" font-family="'SF Mono',monospace" font-size="10" fill="#64748B">app -> models -> shared</text>
  <text x="45" y="240" font-family="'Inter',system-ui,sans-serif" font-size="9" fill="#94A3B8">(project dependency chain)</text>
</svg>

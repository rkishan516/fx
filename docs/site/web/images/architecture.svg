<svg width="800" height="400" viewBox="0 0 800 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="arch_bg" x1="0" y1="0" x2="800" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#F1F5F9"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#0B1929" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="800" height="400" rx="12" fill="url(#arch_bg)" stroke="#E2E8F0" stroke-width="1"/>

  <!-- Title -->
  <text x="400" y="35" font-family="'Inter',system-ui,sans-serif" font-size="16" font-weight="700" fill="#0F172A" text-anchor="middle">Package Architecture</text>

  <!-- CLI Layer -->
  <rect x="250" y="55" width="300" height="50" rx="8" fill="#0B1929" filter="url(#shadow)"/>
  <text x="400" y="77" font-family="'SF Mono',monospace" font-size="14" font-weight="700" fill="#40C4FF" text-anchor="middle">fx_cli</text>
  <text x="400" y="95" font-family="'Inter',system-ui,sans-serif" font-size="11" fill="#94A3B8" text-anchor="middle">Commands, output formatting, daemon</text>

  <!-- Arrow down -->
  <path d="M400 105 L400 125" stroke="#CBD5E1" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Middle Layer -->
  <rect x="40" y="130" width="170" height="50" rx="8" fill="#0D2137" filter="url(#shadow)"/>
  <text x="125" y="152" font-family="'SF Mono',monospace" font-size="14" font-weight="700" fill="#40C4FF" text-anchor="middle">fx_runner</text>
  <text x="125" y="170" font-family="'Inter',system-ui,sans-serif" font-size="11" fill="#94A3B8" text-anchor="middle">Task execution engine</text>

  <rect x="225" y="130" width="170" height="50" rx="8" fill="#0D2137" filter="url(#shadow)"/>
  <text x="310" y="152" font-family="'SF Mono',monospace" font-size="14" font-weight="700" fill="#40C4FF" text-anchor="middle">fx_graph</text>
  <text x="310" y="170" font-family="'Inter',system-ui,sans-serif" font-size="11" fill="#94A3B8" text-anchor="middle">Dependency analysis</text>

  <rect x="410" y="130" width="170" height="50" rx="8" fill="#0D2137" filter="url(#shadow)"/>
  <text x="495" y="152" font-family="'SF Mono',monospace" font-size="14" font-weight="700" fill="#40C4FF" text-anchor="middle">fx_cache</text>
  <text x="495" y="170" font-family="'Inter',system-ui,sans-serif" font-size="11" fill="#94A3B8" text-anchor="middle">Computation caching</text>

  <rect x="595" y="130" width="170" height="50" rx="8" fill="#0D2137" filter="url(#shadow)"/>
  <text x="680" y="152" font-family="'SF Mono',monospace" font-size="14" font-weight="700" fill="#40C4FF" text-anchor="middle">fx_generator</text>
  <text x="680" y="170" font-family="'Inter',system-ui,sans-serif" font-size="11" fill="#94A3B8" text-anchor="middle">Code scaffolding</text>

  <!-- Arrows down -->
  <path d="M125 180 L125 200 L400 200 L400 215" stroke="#CBD5E1" stroke-width="1.5"/>
  <path d="M310 180 L310 200 L400 200" stroke="#CBD5E1" stroke-width="1.5"/>
  <path d="M495 180 L495 200 L400 200" stroke="#CBD5E1" stroke-width="1.5"/>
  <path d="M680 180 L680 200 L400 200" stroke="#CBD5E1" stroke-width="1.5"/>

  <!-- Core Layer -->
  <rect x="250" y="215" width="300" height="50" rx="8" fill="#0B1929" filter="url(#shadow)"/>
  <text x="400" y="237" font-family="'SF Mono',monospace" font-size="14" font-weight="700" fill="#40C4FF" text-anchor="middle">fx_core</text>
  <text x="400" y="255" font-family="'Inter',system-ui,sans-serif" font-size="11" fill="#94A3B8" text-anchor="middle">Models, workspace loading, plugins, migrations</text>

  <!-- Feature boxes at bottom -->
  <rect x="40" y="290" width="135" height="95" rx="8" fill="white" stroke="#E2E8F0" stroke-width="1" filter="url(#shadow)"/>
  <circle cx="60" cy="312" r="8" fill="#40C4FF" opacity="0.15"/>
  <text x="60" y="316" font-family="'Inter',system-ui,sans-serif" font-size="12" fill="#40C4FF" text-anchor="middle" font-weight="600">&#x26A1;</text>
  <text x="75" y="316" font-family="'Inter',system-ui,sans-serif" font-size="12" font-weight="600" fill="#0F172A">Task Runner</text>
  <text x="50" y="334" font-family="'Inter',system-ui,sans-serif" font-size="10" fill="#64748B">Parallel, batched,</text>
  <text x="50" y="348" font-family="'Inter',system-ui,sans-serif" font-size="10" fill="#64748B">continuous, topological</text>
  <text x="50" y="362" font-family="'Inter',system-ui,sans-serif" font-size="10" fill="#64748B">ordering</text>

  <rect x="190" y="290" width="135" height="95" rx="8" fill="white" stroke="#E2E8F0" stroke-width="1" filter="url(#shadow)"/>
  <circle cx="210" cy="312" r="8" fill="#40C4FF" opacity="0.15"/>
  <text x="210" y="316" font-family="'Inter',system-ui,sans-serif" font-size="12" fill="#40C4FF" text-anchor="middle" font-weight="600">&#x1F4CA;</text>
  <text x="225" y="316" font-family="'Inter',system-ui,sans-serif" font-size="12" font-weight="600" fill="#0F172A">Graph</text>
  <text x="200" y="334" font-family="'Inter',system-ui,sans-serif" font-size="10" fill="#64748B">DAG, cycle detection,</text>
  <text x="200" y="348" font-family="'Inter',system-ui,sans-serif" font-size="10" fill="#64748B">task graph, affected</text>
  <text x="200" y="362" font-family="'Inter',system-ui,sans-serif" font-size="10" fill="#64748B">analysis</text>

  <rect x="340" y="290" width="135" height="95" rx="8" fill="white" stroke="#E2E8F0" stroke-width="1" filter="url(#shadow)"/>
  <circle cx="360" cy="312" r="8" fill="#40C4FF" opacity="0.15"/>
  <text x="360" y="316" font-family="'Inter',system-ui,sans-serif" font-size="12" fill="#40C4FF" text-anchor="middle" font-weight="600">&#x1F4BE;</text>
  <text x="375" y="316" font-family="'Inter',system-ui,sans-serif" font-size="12" font-weight="600" fill="#0F172A">Cache</text>
  <text x="350" y="334" font-family="'Inter',system-ui,sans-serif" font-size="10" fill="#64748B">SHA-256, local +</text>
  <text x="350" y="348" font-family="'Inter',system-ui,sans-serif" font-size="10" fill="#64748B">remote (S3/GCS),</text>
  <text x="350" y="362" font-family="'Inter',system-ui,sans-serif" font-size="10" fill="#64748B">graph cache</text>

  <rect x="490" y="290" width="135" height="95" rx="8" fill="white" stroke="#E2E8F0" stroke-width="1" filter="url(#shadow)"/>
  <circle cx="510" cy="312" r="8" fill="#40C4FF" opacity="0.15"/>
  <text x="510" y="316" font-family="'Inter',system-ui,sans-serif" font-size="12" fill="#40C4FF" text-anchor="middle" font-weight="600">&#x1F9E9;</text>
  <text x="525" y="316" font-family="'Inter',system-ui,sans-serif" font-size="12" font-weight="600" fill="#0F172A">Plugins</text>
  <text x="500" y="334" font-family="'Inter',system-ui,sans-serif" font-size="10" fill="#64748B">Generators, executors,</text>
  <text x="500" y="348" font-family="'Inter',system-ui,sans-serif" font-size="10" fill="#64748B">inference hooks,</text>
  <text x="500" y="362" font-family="'Inter',system-ui,sans-serif" font-size="10" fill="#64748B">conformance rules</text>

  <rect x="640" y="290" width="135" height="95" rx="8" fill="white" stroke="#E2E8F0" stroke-width="1" filter="url(#shadow)"/>
  <circle cx="660" cy="312" r="8" fill="#40C4FF" opacity="0.15"/>
  <text x="660" y="316" font-family="'Inter',system-ui,sans-serif" font-size="12" fill="#40C4FF" text-anchor="middle" font-weight="600">&#x1F916;</text>
  <text x="675" y="316" font-family="'Inter',system-ui,sans-serif" font-size="12" font-weight="600" fill="#0F172A">AI / MCP</text>
  <text x="650" y="334" font-family="'Inter',system-ui,sans-serif" font-size="10" fill="#64748B">MCP server, agent</text>
  <text x="650" y="348" font-family="'Inter',system-ui,sans-serif" font-size="10" fill="#64748B">config generation,</text>
  <text x="650" y="362" font-family="'Inter',system-ui,sans-serif" font-size="10" fill="#64748B">workspace tools</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#CBD5E1"/>
    </marker>
  </defs>
</svg>

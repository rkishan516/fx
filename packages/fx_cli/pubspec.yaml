name: fx_cli
description: CLI entry point for the fx monorepo tool.
version: 0.1.0
publish_to: none

resolution: workspace

environment:
  sdk: ^3.11.1

dependencies:
  args: ^2.5.0
  cli_completion: ^0.5.1
  fx_cache:
    path: ../fx_cache
  fx_core:
    path: ../fx_core
  fx_generator:
    path: ../fx_generator
  fx_graph:
    path: ../fx_graph
  fx_runner:
    path: ../fx_runner
  path: ^1.9.0
  yaml: ^3.1.0
  yaml_edit: ^2.2.0

executables:
  fx: fx

dev_dependencies:
  build_runner: ^2.4.8
  lints: ^6.1.0
  mockito: ^5.4.4
  test: ^1.24.0

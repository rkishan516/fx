include: package:lints/recommended.yaml

analyzer:
  exclude:
    - example/**
  language:
    strict-casts: true
    strict-raw-types: true

linter:
  rules:
    - prefer_single_quotes
    - sort_pub_dependencies
    - avoid_print

plugins:
  jaspr_lints:
    version: ^0.6.0
    diagnostics:
      prefer_html_components: true
      sort_children_last: true
      styles_ordering: true
